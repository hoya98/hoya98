<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style>
    .panel { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
    .header { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
    .section-title { font-size: 16px; font-weight: 600; fill: #1f2328; }
    .label { font-size: 13px; fill: #1f2328; font-weight: 600; }
    .help { font-size: 12px; fill: #656d76; }
    .input { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
    .input-text { font-size: 13px; fill: #1f2328; }
    .btn-primary { fill: #1f883d; stroke: rgba(31,35,40,0.15); stroke-width: 1; }
    .btn-text { font-size: 13px; fill: #ffffff; font-weight: 500; }
    .arrow { stroke: #cf222e; stroke-width: 2.4; fill: none; }
    .arrow-head { fill: #cf222e; }
    .annotation { font-size: 14px; fill: #cf222e; font-weight: 600; }
    .step-circle { fill: #cf222e; }
    .step-num { font-size: 13px; fill: #ffffff; font-weight: 700; text-anchor: middle; }
    .url-bar { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
    .url-text { font-family: ui-monospace, Menlo, monospace; font-size: 12px; fill: #57606a; }
    .dim { fill: #656d76; font-size: 12px; }
  </style>

  <!-- Browser url bar -->
  <rect class="url-bar" x="20" y="20" width="880" height="34" rx="6" />
  <text class="url-text" x="36" y="42">github.com/hoya98/hoya98/settings/pages</text>

  <!-- Page header -->
  <text class="section-title" x="20" y="92" font-size="22">GitHub Pages</text>
  <text class="help" x="20" y="115">GitHub Pages is designed to host your personal, organization, or project pages from a GitHub repository.</text>

  <!-- Build and deployment panel -->
  <rect class="panel" x="20" y="145" width="880" height="380" rx="6" />
  <rect class="header" x="20" y="145" width="880" height="42" rx="6" />
  <text class="section-title" x="36" y="173">Build and deployment</text>

  <!-- Source row -->
  <text class="label" x="36" y="225">Source</text>
  <rect class="input" x="36" y="240" width="280" height="36" rx="6" />
  <text class="input-text" x="50" y="263">Deploy from a branch</text>
  <text class="dim" x="290" y="263">▼</text>

  <!-- Step 1 callout -->
  <circle class="step-circle" cx="350" cy="258" r="14" />
  <text class="step-num" x="350" y="263">1</text>
  <text class="annotation" x="372" y="252">Change to</text>
  <text class="annotation" x="372" y="270">"Deploy from a branch"</text>

  <!-- Branch row -->
  <text class="label" x="36" y="320">Branch</text>
  <rect class="input" x="36" y="335" width="200" height="36" rx="6" />
  <text class="input-text" x="50" y="358">main</text>
  <text class="dim" x="210" y="358">▼</text>

  <rect class="input" x="248" y="335" width="120" height="36" rx="6" />
  <text class="input-text" x="262" y="358">/ (root)</text>
  <text class="dim" x="346" y="358">▼</text>

  <rect class="btn-primary" x="384" y="335" width="80" height="36" rx="6" />
  <text class="btn-text" x="424" y="358" text-anchor="middle">Save</text>

  <!-- Step 2 callout -->
  <circle class="step-circle" cx="500" cy="353" r="14" />
  <text class="step-num" x="500" y="358">2</text>
  <text class="annotation" x="520" y="348">Pick</text>
  <text class="annotation" x="520" y="366">main + / (root)</text>

  <!-- Step 3 callout -->
  <circle class="step-circle" cx="670" cy="353" r="14" />
  <text class="step-num" x="670" y="358">3</text>
  <text class="annotation" x="690" y="348">Click</text>
  <text class="annotation" x="690" y="366">Save</text>

  <!-- Arrows -->
  <path class="arrow" d="M 332 248 Q 320 240 310 245" />
  <polygon class="arrow-head" points="306,242 314,247 311,251" />

  <path class="arrow" d="M 484 348 Q 460 348 240 353" />
  <polygon class="arrow-head" points="240,350 246,353 240,357" />

  <path class="arrow" d="M 654 348 Q 600 348 470 353" />
  <polygon class="arrow-head" points="470,350 476,353 470,357" />

  <!-- Result -->
  <text class="help" x="36" y="430">After saving, wait ~60 seconds. This panel will refresh and show:</text>
  <rect x="36" y="445" width="700" height="44" rx="6" fill="#dafbe1" stroke="#1f883d" stroke-width="1" />
  <text font-size="14" fill="#1a7f37" font-weight="600" x="50" y="472">✓ Your site is live at https://hoya98.github.io/</text>

  <text class="help" x="36" y="510">Your app will be at:</text>
  <text font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#0969da" x="36" y="530">https://hoya98.github.io/string-games/</text>

  <!-- Footer note -->
  <text class="help" x="20" y="585">This is a mockup. The real panel may differ slightly in spacing, but the three controls (Source, Branch, Save) are the same.</text>
</svg>
